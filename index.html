<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="A beautiful photo sharing app showcasing amazing spots around the world."
    />
    <meta name="author" content="Devun Cooksey" />
    <meta name="keywords" content="photos, travel, spots, gallery, images" />
    <title>Spots</title>
    <link rel="stylesheet" href="./pages/index.css" />
    <link rel="icon" href="./images/favicon.ico" />
  </head>
  <body>
    <div class="page">
      <header class="header">
        <img src="./images/logo.svg" alt="Spots logo" class="header__logo" />
      </header>
      <main class="content">
        <section class="profile page__section">
          <img
            src="./images/avatar.jpg"
            alt="Bessie Coleman"
            class="profile__avatar"
          />
          <div class="profile__column">
            <h1 class="profile__name">Bessie Coleman</h1>
            <p class="profile__description">Civil Aviator</p>
            <button class="profile__edit-btn" type="button">
              <img
                src="./images/pencil_icon.svg"
                alt="Pencil icon"
                class="profile__edit-icon"
              />
              Edit profile
            </button>
          </div>
          <button class="profile__add-btn" type="button">
            <img
              src="./images/plus_sign.svg"
              alt="Plus icon"
              class="profile__add-icon"
            />
            New Post
          </button>
        </section>
        <section class="cards page__section">
          <ul class="cards__list">
            <template id="card-template"
              ><li class="card">
                <img class="card__image" src="#" alt="" />
                <div class="card__caption">
                  <h2 class="card__title"></h2>
                  <div class="card__buttons">
                    <button class="card__delete-btn" type="button">
                      <img
                        class="card__delete-icon"
                        src="./images/delete.svg"
                        alt="Delete"
                      />
                    </button>
                    <button class="card__like-btn" type="button">
                      <img
                        class="card__like-icon"
                        src="./images/like-icon.svg"
                        alt="Like"
                      />
                    </button>
                  </div>
                </div></li
            ></template>
          </ul>
        </section>
      </main>
      <footer class="footer">
        <p class="footer__copyright">&copy; 2024 Spots</p>
      </footer>
      <div class="modal" id="edit-profile-modal">
        <div class="modal__container">
          <button type="button" class="modal__close-btn">
            <img src="./images/close-icon.svg" alt="Close" class="modal__close-icon" />
          </button>
          <h2 class="modal__title">Edit Profile</h2>
          <form class="modal__form">
            <label for="profile-name-input" class="modal__label">
              Name
              <input
                id="profile-name-input"
                type="text"
                class="modal__input"
                placeholder=" Type Your Name"
                required
              />
            </label>
            <label for="profile-description-input" class="modal__label">
              Description
              <input
                id="profile-description-input"
                type="text"
                class="modal__input"
                placeholder=" Describe yourself"
                required
              />
            </label>
            <button type="submit" class="modal__submit-btn">Save</button>
          </form>
        </div>
      </div>
      <div class="modal" id="preview-modal">
        <div class="modal__container modal__container_type_image">
          <button type="button" class="modal__close-btn">
            <img src="./images/close-icon.svg" alt="Close" class="modal__close-icon" />
          </button>
          <img class="modal__image" src="#" alt="" />
          <p class="modal__caption"></p>
        </div>
      </div>
      <div class="modal" id="new-post-modal">
        <div class="modal__container">
          <button type="button" class="modal__close-btn">
            <img src="./images/close-icon.svg" alt="Close" class="modal__close-icon" />
          </button>
          <h2 class="modal__title">New post</h2>
          <form class="modal__form">
            <label for="new-post-image-input" class="modal__label">
              Image link
              <input
                id="new-post-image-input"
                type="url"
                class="modal__input"
                placeholder=" Paste a link to the picture"
                required
              />
            </label>
            <label for="new-post-caption-input" class="modal__label">
              Caption
              <input
                id="new-post-caption-input"
                type="text"
                class="modal__input"
                placeholder=" Type your caption"
                required
              />
            </label>
            <button type="submit" class="modal__submit-btn">Save</button>
          </form>
        </div>
      </div>
    </div>
    <script src="./scripts/index.js"></script>
  </body>
</html>
